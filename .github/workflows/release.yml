name: Release Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  web-build:
    name: Build Web (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Upload web artifact (for Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-web:
    name: Deploy Web to GitHub Pages
    runs-on: ubuntu-latest
    needs: web-build
    continue-on-error: true
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  desktop-build:
    name: Build Desktop (Installer + Portable)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist:win

      - name: Build portable EXE
        run: npm run dist:portable

      - name: Collect desktop artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          if (-not (Test-Path release)) {
            throw "release folder was not created by desktop build"
          }

          $setupExe = Get-ChildItem -Path release -Recurse -File -Include *Setup*.exe | Select-Object -First 1
          $setupMsi = Get-ChildItem -Path release -Recurse -File -Include *.msi | Select-Object -First 1
          $portableExe = Get-ChildItem -Path release -Recurse -File -Include *Portable*.exe | Select-Object -First 1

          $setup = $setupExe
          if ($null -eq $setup) {
            $setup = $setupMsi
          }

          if ($null -eq $setup) {
            throw "Installer artifact not found (expected Setup exe or msi)"
          }

          if ($null -eq $portableExe) {
            throw "Portable artifact not found (expected Portable exe)"
          }

          Copy-Item $setup.FullName -Destination artifacts -Force
          Copy-Item $portableExe.FullName -Destination artifacts -Force

          Get-FileHash -Path artifacts\* -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $($_.Path | Split-Path -Leaf)"
          } | Set-Content -Path artifacts\checksums.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-builds
          path: artifacts
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.desktop-build.result == 'success' }}
    needs:
      - deploy-web
      - desktop-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release version
        id: version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PKG_VERSION}-build.${GITHUB_RUN_NUMBER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          DEFAULT_WEB_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          WEB_URL="${{ needs.deploy-web.outputs.page_url }}"
          if [ -z "$WEB_URL" ]; then
            WEB_URL="$DEFAULT_WEB_URL"
          fi
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-builds
          path: release-assets

      - name: Ensure assets folder exists
        run: mkdir -p release-assets

      - name: Validate and prepare release assets
        id: assets
        shell: bash
        run: |
          ls -la release-assets
          test -n "$(find release-assets -maxdepth 1 -type f \( -name '*Setup*.exe' -o -name '*.msi' \) | head -n 1)"
          test -n "$(find release-assets -maxdepth 1 -type f -name '*Portable*.exe' | head -n 1)"

          mapfile -t FILES < <(find release-assets -maxdepth 1 -type f \( -name '*Setup*.exe' -o -name '*.msi' -o -name '*Portable*.exe' -o -name 'checksums.txt' \) | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release files found in release-assets"
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            Version: ${{ steps.version.outputs.pkg_version }}
            Commit: ${{ github.sha }}
            Web URL: ${{ steps.version.outputs.web_url }}
            
            Downloads:
            - Windows Installer: archivo con nombre TypingTest-Setup-<version>.exe
            - Windows Portable: archivo con nombre TypingTest-Portable-<version>.exe
            - Verificacion: checksums.txt (SHA256)
          files: ${{ steps.assets.outputs.files }}
          fail_on_unmatched_files: true
